<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#159447">
  <title>จัดการสินค้าและสต็อก</title>
  <link rel="stylesheet" href="/assets/css/retail-pos.css?v=20260624-6">
  <link rel="stylesheet" href="/assets/css/retail-products.css?v=20260624-1">
  <link rel="stylesheet" href="/assets/css/retail-pos-navigation.css?v=20260624-2">
</head>
<body>
  <header class="pos-header">
    <div>
      <strong>จัดการสินค้าและสต็อก</strong>
      <small>POS ร้านค้าปลีก • โหมดทดสอบ</small>
    </div>
    <div class="header-actions">
      <a href="/pos" class="btn btn-secondary nav-link">หน้าขาย</a>
      <button id="addProductBtn" class="btn btn-pay" type="button">เพิ่มสินค้า</button>
    </div>
  </header>

  <main class="management-container">
    <section class="stats-grid">
      <article class="stat-card"><span>จำนวนสินค้า</span><strong id="productCount">0</strong></article>
      <article class="stat-card"><span>สินค้าคงเหลือรวม</span><strong id="stockTotal">0</strong></article>
      <article class="stat-card warning"><span>สินค้าใกล้หมด</span><strong id="lowStockCount">0</strong></article>
      <article class="stat-card danger"><span>สินค้าหมด</span><strong id="outStockCount">0</strong></article>
    </section>

    <section class="panel management-panel">
      <div class="toolbar">
        <input id="productSearch" placeholder="ค้นหาชื่อ รหัส หรือบาร์โค้ด">
        <select id="stockFilter">
          <option value="all">สินค้าทั้งหมด</option>
          <option value="low">สินค้าใกล้หมด</option>
          <option value="out">สินค้าหมด</option>
        </select>
      </div>

      <div class="table-wrap">
        <table class="product-table">
          <thead>
            <tr>
              <th>รหัส</th>
              <th>สินค้า</th>
              <th>บาร์โค้ด</th>
              <th class="number">ราคาขาย</th>
              <th class="number">คงเหลือ</th>
              <th>หน่วย</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="productTableBody"></tbody>
        </table>
      </div>
      <div id="tableEmpty" class="empty-state" hidden>ไม่พบสินค้า</div>
    </section>

    <section class="panel movement-panel">
      <div class="section-heading">
        <div><h2>ประวัติการปรับสต็อก</h2><p>แสดง 50 รายการล่าสุดในเครื่องนี้</p></div>
        <button id="clearMovementBtn" class="btn btn-danger" type="button">ล้างประวัติ</button>
      </div>
      <div id="movementList" class="movement-list"></div>
      <div id="movementEmpty" class="empty-state">ยังไม่มีประวัติการปรับสต็อก</div>
    </section>
  </main>

  <dialog id="productDialog">
    <form id="productForm" class="payment-form">
      <div class="dialog-head">
        <h2 id="productDialogTitle">เพิ่มสินค้า</h2>
        <button type="button" id="closeProductDialog" class="icon-btn" aria-label="ปิด">×</button>
      </div>
      <input id="editingProductId" type="hidden">
      <div class="form-grid">
        <label>รหัสสินค้า
          <input id="productId" required maxlength="30" autocomplete="off" placeholder="เช่น P001">
        </label>
        <label>บาร์โค้ด
          <input id="productBarcode" required maxlength="50" autocomplete="off" inputmode="numeric">
        </label>
        <label class="full">ชื่อสินค้า
          <input id="productName" required maxlength="120" autocomplete="off">
        </label>
        <label>ราคาขาย
          <input id="productPrice" required type="number" min="0" step="0.01">
        </label>
        <label>หน่วยนับ
          <input id="productUnit" required maxlength="30" placeholder="ชิ้น / ขวด / ซอง">
        </label>
        <label>สต็อกเริ่มต้น
          <input id="productStock" required type="number" min="0" step="1">
        </label>
        <label>จุดแจ้งเตือนใกล้หมด
          <input id="productMinStock" required type="number" min="0" step="1" value="5">
        </label>
      </div>
      <p id="productFormError" class="error-text"></p>
      <div class="dialog-actions">
        <button type="button" id="cancelProductBtn" class="btn btn-secondary">ยกเลิก</button>
        <button type="submit" class="btn btn-pay">บันทึกสินค้า</button>
      </div>
    </form>
  </dialog>

  <dialog id="stockDialog">
    <form id="stockForm" class="payment-form">
      <div class="dialog-head">
        <h2>ปรับสต็อก</h2>
        <button type="button" id="closeStockDialog" class="icon-btn" aria-label="ปิด">×</button>
      </div>
      <input id="stockProductId" type="hidden">
      <div class="stock-product-name" id="stockProductName"></div>
      <label>ประเภทการปรับ
        <select id="stockAction">
          <option value="add">เพิ่มสต็อก</option>
          <option value="remove">ลดสต็อก</option>
          <option value="set">กำหนดยอดใหม่</option>
        </select>
      </label>
      <label>จำนวน
        <input id="stockQuantity" required type="number" min="0" step="1" value="1">
      </label>
      <label>หมายเหตุ
        <input id="stockNote" maxlength="150" placeholder="เช่น รับสินค้าเข้า / ของเสีย / ตรวจนับ">
      </label>
      <p id="stockFormError" class="error-text"></p>
      <div class="dialog-actions">
        <button type="button" id="cancelStockBtn" class="btn btn-secondary">ยกเลิก</button>
        <button type="submit" class="btn btn-pay">ยืนยันปรับสต็อก</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script type="module" src="/assets/js/retail-products.js?v=20260624-2"></script>
  <script type="module" src="/assets/js/retail-product-merchandising.js?v=20260624-2"></script>
  <script type="module" src="/assets/js/retail-pos-navigation.js?v=20260624-1"></script>
</body>
</html>
