<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#159447">
<title>ทะเบียนผู้จำหน่าย</title>
<link rel="stylesheet" href="/assets/css/retail-pos.css?v=20260627-2">
<link rel="stylesheet" href="/assets/css/retail-suppliers.css?v=20260626-2">
<link rel="stylesheet" href="/assets/css/retail-pos-navigation.css?v=20260625-12">
</head>
<body>
<header class="pos-header"><div class="app-title"><span class="app-badge">FOD</span><div><strong>ทะเบียนผู้จำหน่าย</strong><small>ข้อมูลติดต่อและยอดซื้อสะสม</small></div></div><div class="header-actions"></div></header>
<main class="supplier-container"><section class="supplier-stats"><article><span>ผู้จำหน่ายทั้งหมด</span><strong id="supplierTotal">0</strong></article><article><span>ผู้จำหน่ายที่เคยซื้อ</span><strong id="activeSupplierTotal">0</strong></article><article><span>ยอดซื้อสะสม</span><strong id="supplierPurchaseTotal">0.00</strong></article><article><span>จำนวนใบซื้อ</span><strong id="supplierPurchaseCount">0</strong></article></section><section class="panel supplier-panel"><div class="section-heading supplier-list-heading"><div><h2>ผู้จำหน่าย</h2><p>จัดการข้อมูลติดต่อ เครดิต และยอดซื้อสะสม</p></div><button id="addSupplierBtn" class="btn btn-pay" type="button">เพิ่มผู้จำหน่าย</button></div><div class="supplier-toolbar"><input id="supplierSearch" placeholder="ค้นหาชื่อ ผู้ติดต่อ เบอร์โทร หรือเลขภาษี"><select id="supplierFilter"><option value="all">ทั้งหมด</option><option value="active">เคยมีรายการซื้อ</option><option value="inactive">ยังไม่มีรายการซื้อ</option></select></div><div id="supplierGrid" class="supplier-grid"></div><div id="supplierEmpty" class="empty-state">ยังไม่มีข้อมูลผู้จำหน่าย</div></section></main>
<dialog id="supplierDialog"><form id="supplierForm" class="payment-form"><div class="dialog-head"><h2 id="supplierDialogTitle">เพิ่มผู้จำหน่าย</h2><button id="closeSupplierDialog" type="button" class="icon-btn">×</button></div><input id="editingSupplierId" type="hidden"><div class="supplier-form-grid"><label class="full">ชื่อผู้จำหน่าย<input id="supplierName" maxlength="120" required></label><label>ชื่อผู้ติดต่อ<input id="supplierContact" maxlength="100"></label><label>เบอร์โทร<input id="supplierPhone" maxlength="30" inputmode="tel"></label><label>อีเมล<input id="supplierEmail" maxlength="120" type="email"></label><label>เลขประจำตัวผู้เสียภาษี<input id="supplierTaxId" maxlength="20" inputmode="numeric"></label><label>เครดิต (วัน)<input id="supplierCreditDays" type="number" min="0" step="1" value="0"></label><label class="full">ที่อยู่<textarea id="supplierAddress" rows="3" maxlength="500"></textarea></label><label class="full">หมายเหตุ<textarea id="supplierNote" rows="2" maxlength="300"></textarea></label></div><p id="supplierFormError" class="error-text"></p><div class="dialog-actions"><button id="cancelSupplierBtn" type="button" class="btn btn-secondary">ยกเลิก</button><button type="submit" class="btn btn-pay">บันทึกผู้จำหน่าย</button></div></form></dialog>
<div id="toast" class="toast" role="status"></div>
<script type="module" src="/assets/js/retail-toast-status.js?v=20260627-2"></script>
<script type="module" src="/assets/js/retail-suppliers.js?v=20260625-1"></script>
<script type="module" src="/assets/js/retail-pos-navigation.js?v=20260625-12"></script>
<script type="module" src="/assets/js/retail-purchasing-permissions.js?v=20260625-2"></script>
</body>
</html>
