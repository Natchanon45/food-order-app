<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#159447">
<title>รับสินค้าเข้าและใบซื้อ</title>
<link rel="stylesheet" href="/assets/css/retail-pos.css?v=20260624-6">
<link rel="stylesheet" href="/assets/css/retail-purchases.css?v=20260624-2">
<link rel="stylesheet" href="/assets/css/retail-purchases-report.css?v=20260624-1">
<link rel="stylesheet" href="/assets/css/retail-pos-navigation.css?v=20260624-2">
</head>
<body>
<header class="pos-header"><div><strong>รับสินค้าเข้าและใบซื้อ</strong><small>เพิ่มสต็อกและคำนวณต้นทุนเฉลี่ย</small></div><div class="header-actions"><a href="/pos/" class="btn btn-secondary header-link">หน้าขาย</a><a href="/pos/products/" class="btn btn-secondary header-link">สินค้าและสต็อก</a><a href="/pos/suppliers/" class="btn btn-secondary header-link">ผู้จำหน่าย</a></div></header>
<main class="purchase-container">
<section class="panel purchase-form-panel">
<div class="section-heading"><div><h1>บันทึกรับสินค้าเข้า</h1><p>ต้นทุนใหม่คำนวณแบบเฉลี่ยถ่วงน้ำหนัก</p></div></div>
<form id="purchaseForm">
<div class="purchase-meta-grid">
<label>ผู้จำหน่าย<input id="supplierName" maxlength="120" required list="supplierList" autocomplete="off"><datalist id="supplierList"></datalist><small id="supplierHint">เลือกจากทะเบียนผู้จำหน่าย หรือพิมพ์ชื่อใหม่ได้</small></label>
<label>เลขที่ใบซื้อ / ใบส่งของ<input id="purchaseInvoice" maxlength="80"></label>
<label>วันที่รับสินค้า<input id="purchaseDate" type="date" required></label>
<label>หมายเหตุ<input id="purchaseNote" maxlength="200"></label>
</div>
<div class="purchase-lines-heading"><h2>รายการสินค้า</h2><button id="addPurchaseLineBtn" class="btn btn-secondary" type="button">เพิ่มรายการ</button></div>
<div class="purchase-table-wrap"><table class="purchase-table"><thead><tr><th>สินค้า</th><th class="number">คงเหลือเดิม</th><th class="number">จำนวนรับ</th><th class="number">ราคาทุน/หน่วย</th><th class="number">รวม</th><th></th></tr></thead><tbody id="purchaseLines"></tbody></table></div>
<div class="purchase-summary"><span>ยอดซื้อรวม</span><strong id="purchaseTotal">0.00 บาท</strong></div>
<p id="purchaseError" class="error-text"></p>
<div class="purchase-actions"><button id="resetPurchaseBtn" class="btn btn-secondary" type="button">ล้างรายการ</button><button class="btn btn-pay" type="submit">บันทึกรับสินค้า</button></div>
</form>
</section>
<section class="panel purchase-history-panel">
<div class="section-heading"><div><h2>ประวัติการรับสินค้า</h2><p>รายการล่าสุดในเครื่องนี้</p></div><input id="purchaseSearch" placeholder="ค้นหาผู้จำหน่าย เลขที่ใบซื้อ หรือสินค้า"></div>
<div id="purchaseHistory" class="purchase-history"></div><div id="purchaseHistoryEmpty" class="empty-state">ยังไม่มีประวัติการรับสินค้า</div>
</section>
</main>
<div id="toast" class="toast" role="status"></div>
<script type="module" src="/assets/js/retail-purchases.js?v=20260624-3"></script>
<script type="module" src="/assets/js/retail-purchases-report.js?v=20260624-1"></script>
<script type="module" src="/assets/js/retail-pos-navigation.js?v=20260624-1"></script>
</body>
</html>
