<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#159447">
<title>เข้าสู่ระบบ POS</title>
<link rel="stylesheet" href="/assets/css/retail-pos.css?v=20260702-007">
<link rel="stylesheet" href="/assets/css/retail-pos-login.css?v=20260627-3">
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Kanit","Sarabun",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#151515}body.login-page{min-height:100dvh;display:grid;place-items:center;padding:20px;background:linear-gradient(145deg,#eef8f1,#f8fbf9)}.login-shell{width:min(430px,100%)}.login-card{padding:28px;border:1px solid #dbe5df;border-radius:20px;background:#fff;box-shadow:0 20px 55px rgba(15,23,42,.12)}.login-brand{text-align:center;margin-bottom:24px}.login-brand .login-logo{width:64px;height:64px;margin:0 auto 12px;display:grid;place-items:center;border-radius:18px;background:#159447;color:#fff;font-size:1.55rem;font-weight:900}.login-brand h1{margin:0;font-size:1.45rem;line-height:1.25}.login-brand p{margin:7px 0 0;color:#64748b}.login-form{display:grid;gap:14px}.login-form label{display:grid;gap:7px;font-weight:700}.login-form input{width:100%;min-height:46px;border:1px solid #dde5df;border-radius:12px;padding:11px 12px;background:#fff;font:inherit}.login-form input:focus{outline:3px solid #15944722;border-color:#159447}.login-password-wrap{position:relative}.login-password-wrap input{padding-right:72px}.login-password-wrap button{position:absolute;right:7px;top:50%;transform:translateY(-50%);border:0;background:transparent;color:#159447;font-weight:800;padding:7px;font:inherit}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:700;font:inherit;cursor:pointer}.btn-pay{background:#159447;color:#fff}.login-submit{min-height:48px;margin-top:4px}.login-error{min-height:22px;margin:0;color:#b42318;font-weight:700}.login-loading{display:inline-flex;align-items:center;gap:8px}.login-loading::before{content:"";width:15px;height:15px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:login-spin .8s linear infinite}@keyframes login-spin{to{transform:rotate(360deg)}}@media(max-width:520px){body.login-page{padding:12px}.login-card{padding:20px;border-radius:16px}.login-brand .login-logo{width:60px;height:60px}.login-brand h1{font-size:1.38rem}}
</style>
</head>
<body class="login-page">
<main class="login-shell">
<section class="login-card">
<div class="login-brand"><div class="login-logo">POS</div><h1>เข้าสู่ระบบร้านค้าปลีก</h1><p>กรอกอีเมลและรหัสผ่านเพื่อเข้าใช้งาน</p></div>
<form id="loginForm" class="login-form">
<label>อีเมล<input id="loginUsername" type="email" autocomplete="username" maxlength="100" required autofocus></label>
<label>รหัสผ่าน<div class="login-password-wrap"><input id="loginPassword" type="password" autocomplete="current-password" maxlength="100" required><button id="togglePasswordBtn" type="button">แสดง</button></div></label>
<p id="loginError" class="login-error"></p>
<button id="loginSubmitBtn" class="btn btn-pay login-submit" type="submit">เข้าสู่ระบบ</button>
</form>
</section>
</main>
<script type="module" src="/assets/js/retail-pos-login.js?v=20260629-035"></script>
<script type="module" src="/assets/js/retail-pos-icons.js?v=20260702-005"></script>
<script>window.addEventListener('error',function(){var e=document.getElementById('loginError'),b=document.getElementById('loginSubmitBtn');if(e)e.textContent='โหลดระบบเข้าสู่ระบบไม่สำเร็จ กรุณารีเฟรชหน้า';if(b){b.disabled=false;b.textContent='เข้าสู่ระบบ'}});window.addEventListener('unhandledrejection',function(){var e=document.getElementById('loginError'),b=document.getElementById('loginSubmitBtn');if(e)e.textContent='ระบบเข้าสู่ระบบเกิดข้อผิดพลาด กรุณาลองใหม่';if(b){b.disabled=false;b.textContent='เข้าสู่ระบบ'}});</script>
</body>
</html>
