<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#159447">
  <link rel="stylesheet" href="/assets/css/app.css?v=20260621-12">
  <link rel="stylesheet" href="/assets/css/menu-qr.css?v=20260621-12">
  <link rel="stylesheet" href="/assets/css/customer-rounds.css?v=20260621-12">
  <link rel="stylesheet" href="/assets/css/order-sticky.css?v=20260621-12">
  <link rel="stylesheet" href="/assets/css/menu-pagination.css?v=20260621-12">
  <link rel="stylesheet" href="/assets/css/pos-refresh.css?v=20260621-12">
  <link rel="stylesheet" href="/assets/css/mobile-menu-scroll.css?v=20260621-12">
  <title>สั่งอาหาร</title>
</head>
<body class="table-order-page">
  <div id="demoBanner"></div>
  <header class="app-header">
    <div class="brand"><span class="brand-mark">FO</span><span>สั่งอาหาร</span></div>
  </header>
  <nav class="order-sticky-nav" aria-label="โต๊ะและหมวดหมู่อาหาร">
    <div class="order-table-row"><span class="order-table-label">โต๊ะ</span><strong class="order-table-code" id="tableBadge">กำลังตรวจสอบ</strong></div>
    <div class="category-tabs" id="categoryTabs" role="tablist" aria-label="หมวดหมู่อาหาร"></div>
  </nav>
  <main class="container order-container">
    <section class="hero order-hero"><h1 id="tableTitle">เมนูอาหาร</h1><p>เลือกเมนู ใส่หมายเหตุ และกดยืนยันได้ทันที</p></section>
    <section id="previousOrdersSection" class="previous-orders" hidden>
      <div class="section-title"><h2>รายการที่โต๊ะนี้สั่งแล้ว</h2><span id="previousRoundCount" class="badge">0 รอบ</span></div>
      <div id="previousOrdersList" class="previous-orders-list"></div>
    </section>
    <div class="menu-filter-area order-search-area" id="menuListStart"><input class="input menu-search" id="searchInput" placeholder="ค้นหาเมนู..."></div>
    <div id="menuGrid" class="grid grid-3"></div>
    <nav id="menuPagination" class="menu-pagination" aria-label="เปลี่ยนหน้ารายการอาหาร" hidden></nav>
    <section id="cartSection" class="card current-round" style="margin-top:18px">
      <div class="section-title"><h2>รายการรอบปัจจุบัน <span id="currentRoundLabel" class="round-label">รอบที่ 1</span></h2><span id="cartCount" class="badge">0 รายการ</span></div>
      <div id="cartList" class="cart-list"></div>
      <div class="field" style="margin-top:14px"><label>หมายเหตุรวมถึงร้าน</label><textarea class="input" id="orderNote" placeholder="เช่น ขอช้อนเพิ่ม"></textarea></div>
    </section>
  </main>
  <div class="cart-bar"><div><small>ยอดรวมรอบปัจจุบัน</small><div style="font-size:20px;font-weight:800"><span id="cartTotal">0.00</span> บาท</div></div><button class="btn btn-primary" id="submitOrder">ยืนยันการสั่ง</button></div>
  <script type="module" src="/assets/js/table-qr-resolver.js?v=20260621-12"></script>
  <script type="module" src="/assets/js/customer-secure.js?v=20260621-12"></script>
  <script type="module" src="/assets/js/mobile-menu-scroll.js?v=20260621-12"></script>
</body>
</html>
