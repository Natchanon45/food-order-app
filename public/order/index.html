<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#159447">
  <link rel="stylesheet" href="/assets/css/app.css">
  <title>สั่งอาหาร</title>
</head>
<body>
  <div id="demoBanner"></div>

  <header class="app-header">
    <div class="brand"><span class="brand-mark">FO</span><span>สั่งอาหาร</span></div>
    <span class="badge" id="tableBadge">กำลังตรวจสอบโต๊ะ</span>
  </header>

  <main class="container">
    <section class="hero">
      <h1 id="tableTitle">เมนูอาหาร</h1>
      <p>เลือกเมนู ใส่หมายเหตุ และกดยืนยันได้ทันที</p>
    </section>

    <div class="menu-filter-area">
      <div class="category-tabs" id="categoryTabs" role="tablist" aria-label="หมวดหมู่อาหาร"></div>
      <input class="input menu-search" id="searchInput" placeholder="ค้นหาเมนู...">
    </div>

    <div id="menuGrid" class="grid grid-3"></div>

    <section id="cartSection" class="card" style="margin-top:18px">
      <div class="section-title">
        <h2>ตะกร้าอาหาร</h2>
        <span id="cartCount" class="badge">0 รายการ</span>
      </div>
      <div id="cartList" class="cart-list"></div>
      <div class="field" style="margin-top:14px">
        <label>หมายเหตุรวมถึงร้าน</label>
        <textarea class="input" id="orderNote" placeholder="เช่น ขอช้อนเพิ่ม"></textarea>
      </div>
    </section>
  </main>

  <div class="cart-bar">
    <div>
      <small>ยอดรวม</small>
      <div style="font-size:20px;font-weight:800"><span id="cartTotal">0.00</span> บาท</div>
    </div>
    <button class="btn btn-primary" id="submitOrder">ยืนยันการสั่ง</button>
  </div>

  <script type="module" src="/assets/js/customer.js"></script>
</body>
</html>
