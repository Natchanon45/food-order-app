<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#159447">
  <link rel="stylesheet" href="/assets/css/app.css?v=20260622-5">
  <link rel="stylesheet" href="/assets/css/menu-qr.css?v=20260622-5">
  <link rel="stylesheet" href="/assets/css/customer-rounds.css?v=20260622-5">
  <link rel="stylesheet" href="/assets/css/menu-pagination.css?v=20260622-5">
  <link rel="stylesheet" href="/assets/css/icons.css?v=20260629-040">
  <link rel="stylesheet" href="/assets/css/pos-refresh.css?v=20260629-046">
  <link rel="stylesheet" href="/assets/css/table-order-sticky-lite.css?v=20260630-057">
  <link rel="stylesheet" href="/assets/css/sweet-dialog.css?v=20260629-048">
  <title>สั่งอาหาร</title>
</head>
<body class="table-order-page">
  <div id="demoBanner"></div>
  <header class="app-header">
    <div class="brand"><span class="brand-mark">FO</span><span>สั่งอาหาร</span></div>
    <span class="badge" id="tableBadge">กำลังตรวจสอบ</span>
  </header>

  <main class="container">
    <section class="hero"><h1 id="tableTitle">เมนูอาหาร</h1><p>เลือกเมนู ใส่หมายเหตุ และกดยืนยันได้ทันที</p></section>

    <div class="delivery-pos">
      <div class="delivery-menu-column">
        <div class="menu-filter-area" id="menuListStart">
          <div class="category-tabs" id="categoryTabs" role="tablist" aria-label="หมวดหมู่อาหาร"></div>
          <input class="input menu-search" id="searchInput" placeholder="ค้นหาเมนู...">
        </div>
        <div id="menuGrid" class="grid grid-3"></div>
        <nav id="menuPagination" class="menu-pagination" aria-label="เปลี่ยนหน้ารายการอาหาร" hidden></nav>
      </div>

      <div class="delivery-side-column">
        <section id="cartSection" class="card current-round">
          <div class="section-title">
            <h2>รายการรอบปัจจุบัน <span id="currentRoundLabel" class="round-label">รอบที่ 1</span></h2>
            <span id="cartCount" class="badge">0 รายการ</span>
          </div>
          <div id="cartList" class="cart-list"></div>
          <div class="field" style="margin-top:14px"><label>หมายเหตุรวมถึงร้าน</label><textarea class="input" id="orderNote" placeholder="เช่น ขอช้อนเพิ่ม"></textarea></div>
        </section>

        <section id="previousOrdersSection" class="card previous-orders" style="margin-top:18px" hidden>
          <div class="section-title"><h2>รายการที่โต๊ะนี้สั่งแล้ว</h2><span id="previousRoundCount" class="badge">0 รอบ</span></div>
          <div id="previousOrdersList" class="previous-orders-list"></div>
        </section>
      </div>
    </div>
  </main>

  <div class="cart-bar"><div><small>ยอดรวมรอบปัจจุบัน</small><div style="font-size:20px;font-weight:800"><span id="cartTotal">0.00</span> บาท</div></div><button class="btn btn-primary" id="submitOrder">ยืนยันการสั่ง</button></div>

  <script type="module" src="/assets/js/sweet-dialog.js?v=20260629-048"></script>
  <script type="module" src="/assets/js/public-tenant-resolver.js?v=20260629-025"></script>
  <script type="module" src="/assets/js/table-qr-resolver.js?v=20260622-5"></script>
  <script type="module" src="/assets/js/customer-secure.js?v=20260630-050"></script>
  <script type="module" src="/assets/js/dom-menu-pagination.js?v=20260629-046"></script>
  <script type="module" src="/assets/js/table-order-category-scrollspy.js?v=20260622-1"></script>
</body>
</html>
