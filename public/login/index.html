<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#159447">
  <link rel="stylesheet" href="/assets/css/app.css?v=20260702-002">
  <title>เข้าสู่ระบบ</title>
</head>
<body>
  <main class="auth-shell">
    <section class="card auth-card">
      <div class="brand" style="justify-content:center;margin-bottom:18px"><span class="brand-mark">FOD</span>Food Order/Delivery With QR</div>
      <h1 style="text-align:center;margin:0 0 6px">เข้าสู่ระบบพนักงาน</h1>
      <p class="menu-category" style="text-align:center;margin-bottom:18px">Admin • Cashier • Kitchen • Super Admin</p>
      <form id="loginForm" class="grid">
        <div class="field"><label>อีเมล</label><input class="input" id="email" type="email" autocomplete="username" required></div>
        <div class="field"><label>รหัสผ่าน</label><input class="input" id="password" type="password" autocomplete="current-password" required minlength="6"></div>
        <button class="btn btn-primary" id="loginButton">เข้าสู่ระบบ</button>
        <div class="upload-error" id="loginError" hidden></div>
      </form>
    </section>
  </main>
  <script type="module" src="/assets/js/login.js?v=20260621-34"></script>
</body>
</html>
