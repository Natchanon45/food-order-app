<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#159447">
  <link rel="stylesheet" href="/assets/css/app.css?v=20260702-002">
  <link rel="stylesheet" href="/assets/css/icons.css?v=20260702-003">
  <title>จัดการพนักงาน</title>
</head>
<body data-roles="owner,super_admin">
  <header class="app-header">
    <div class="brand"><span class="brand-mark">FO</span>จัดการพนักงาน</div>
    <a class="btn btn-sm" href="/admin">กลับหน้าจัดการร้าน</a>
  </header>

  <main class="container">
    <section class="hero">
      <h1>พนักงานของร้าน</h1>
      <p>Owner สามารถเพิ่ม เปิดหรือปิด และกำหนดสิทธิ์พนักงานเฉพาะร้านของตนเอง</p>
    </section>

    <section class="card">
      <div class="section-title"><h2>สร้างผู้ใช้ใหม่</h2></div>
      <form id="userForm" class="grid">
        <div class="grid grid-2">
          <div class="field"><label>ชื่อที่แสดง</label><input class="input" id="displayName" required maxlength="100"></div>
          <div class="field"><label>อีเมล</label><input class="input" id="email" type="email" autocomplete="off" required></div>
        </div>
        <div class="grid grid-2">
          <div class="field"><label>รหัสผ่านเริ่มต้น</label><input class="input" id="password" type="password" autocomplete="new-password" minlength="8" required></div>
          <div class="field"><label>ยืนยันรหัสผ่าน</label><input class="input" id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required></div>
        </div>
        <div class="field"><label>สิทธิ์พนักงาน</label><select class="input" id="role" required><option value="admin">Admin</option><option value="cashier">Cashier</option><option value="kitchen">Kitchen</option></select></div>
        <label><input type="checkbox" id="active" checked> เปิดใช้งานทันที</label>
        <button class="btn btn-primary" id="createUserButton">สร้างผู้ใช้งาน</button>
        <div class="upload-error" id="userError" hidden></div>
      </form>
    </section>

    <section class="card" style="margin-top:16px">
      <div class="section-title"><h2>รายการพนักงาน</h2><span class="badge" id="userCount">0 คน</span></div>
      <div style="overflow:auto">
        <table class="table-list">
          <thead><tr><th>ชื่อ</th><th>อีเมล</th><th>สิทธิ์</th><th>เปิดใช้งาน</th><th></th></tr></thead>
          <tbody id="userRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="/assets/js/page-guard.js?v=20260701-015"></script>
  <script type="module" src="/assets/js/admin-users.js?v=20260701-025"></script>
</body>
</html>
