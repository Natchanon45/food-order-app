<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#159447" />
    <link rel="stylesheet" href="/assets/css/app.css?v=20260701-001" />
    <link
      rel="stylesheet"
      href="/assets/css/receipt-layout.css?v=20260701-020"
    />
    <title>พิมพ์ใบเสร็จ</title>
  </head>
  <body>
    <div id="demoBanner"></div>
    <header class="app-header no-print">
      <div class="brand"><span class="brand-mark">FO</span>พิมพ์ใบเสร็จ</div>
      <a class="btn btn-sm" href="/cashier">ย้อนกลับ</a>
    </header>
    <main class="receipt-page">
      <div class="receipt-toolbar no-print">
        <label for="paperSize">ขนาดกระดาษ</label
        ><select
          class="input"
          id="paperSize"
          style="width: auto; min-width: 130px"
        >
          <option value="80">80 มม.</option>
          <option value="58">58 มม.</option>
          <option value="a4">A4</option></select
        ><button class="btn btn-primary" id="printButton">พิมพ์ใบเสร็จ</button>
      </div>
      <section class="receipt" id="receipt">
        <div class="receipt-header">
          <h1 id="shopName">Food Order QR</h1>
          <div id="shopAddress"></div>
          <div id="shopPhone"></div>
          <strong id="receiptTitle">ใบเสร็จรับเงิน</strong>
        </div>
        <hr class="receipt-rule" />
        <div class="receipt-row">
          <span id="receiptTypeLabel">โต๊ะ</span
          ><strong id="receiptTable">-</strong>
        </div>
        <div class="receipt-row">
          <span>เลขที่บิล</span><span id="receiptNumber">-</span>
        </div>
        <div class="receipt-row">
          <span>วันที่</span><span id="receiptDate">-</span>
        </div>
        <div class="receipt-row">
          <span>การชำระเงิน</span><strong id="receiptPayment">-</strong>
        </div>
        <div id="deliveryInfo" hidden>
          <hr class="receipt-rule" />
          <div>
            <strong>ชื่อผู้รับ:</strong> <span id="receiptRecipient">-</span>
          </div>
          <div><strong>โทร:</strong> <span id="receiptPhone">-</span></div>
          <div>
            <strong>ที่อยู่:</strong> <span id="receiptAddress">-</span>
          </div>
          <div>
            <strong>พื้นที่:</strong> <span id="receiptDeliveryZone">-</span>
          </div>
        </div>
        <hr class="receipt-rule" />
        <table class="receipt-items receipt-items-3col">
          <thead>
            <tr>
              <th>รายการ</th>
              <th class="num receipt-unit">ราคา</th>
              <th class="num receipt-line-total">รวม</th>
            </tr>
          </thead>
          <tbody id="receiptItems"></tbody>
        </table>
        <hr class="receipt-rule" />
        <div id="receiptDeliverySummary" hidden>
          <div class="receipt-row">
            <span>ค่าอาหาร</span
            ><span><span id="receiptSubtotal">0.00</span> บาท</span>
          </div>
          <div class="receipt-row">
            <span>ค่าจัดส่ง</span
            ><span><span id="receiptDeliveryFee">0.00</span> บาท</span>
          </div>
        </div>
        <div class="receipt-row receipt-total">
          <span>ยอดสุทธิ</span
          ><span><span id="receiptTotal">0.00</span> บาท</span>
        </div>
        <div id="receiptNoteWrap" class="receipt-note" hidden>
          <hr class="receipt-rule" />
          <strong>หมายเหตุ</strong>
          <div id="receiptNote"></div>
        </div>
        <hr class="receipt-rule" />
        <div class="receipt-header">
          <img id="verifyQr" width="112" height="112" alt="QR ตรวจสอบใบเสร็จ" />
          <div>สแกนเพื่อตรวจสอบใบเสร็จจริง</div>
          <small id="verifyCode"></small>
        </div>
      </section>
    </main>
    <script
      type="module"
      src="/assets/js/receipt-combined.js?v=20260702-001"
    ></script>
  </body>
</html>
