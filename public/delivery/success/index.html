<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#159447">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link rel="stylesheet" href="/assets/css/receipt-layout.css">
  <title>บันทึกคำสั่งซื้อ</title>
</head>
<body>
  <header class="app-header">
    <div class="brand"><span class="brand-mark">FO</span>คำสั่งซื้อ Delivery</div>
    <a class="btn btn-sm" href="/delivery">สั่งเพิ่ม</a>
  </header>

  <main class="receipt-page">
    <div class="receipt-toolbar">
      <button class="btn btn-primary" id="saveImageButton">บันทึก/แชร์เป็นรูป</button>
      <a class="btn" href="/">กลับหน้าหลัก</a>
    </div>

    <section class="receipt" id="customerReceipt">
      <div class="receipt-header">
        <h1 id="shopName">Food Order QR</h1>
        <div id="shopAddress"></div>
        <div id="shopPhone"></div>
        <strong>หลักฐานคำสั่งซื้อ Delivery</strong>
      </div>
      <hr class="receipt-rule">
      <div class="receipt-row"><span>เลขที่รายการ</span><strong id="receiptNumber">-</strong></div>
      <div class="receipt-row"><span>วันที่</span><span id="receiptDate">-</span></div>
      <div class="receipt-row"><span>การชำระเงิน</span><strong id="receiptPayment">-</strong></div>
      <hr class="receipt-rule">
      <div><strong>ชื่อผู้รับ:</strong> <span id="receiptRecipient">-</span></div>
      <div><strong>โทร:</strong> <span id="receiptPhone">-</span></div>
      <div><strong>ที่อยู่:</strong> <span id="receiptAddress">-</span></div>
      <hr class="receipt-rule">
      <table class="receipt-items receipt-items-3col">
        <thead><tr><th>รายการ</th><th class="num receipt-unit">ราคา</th><th class="num receipt-line-total">รวม</th></tr></thead>
        <tbody id="receiptItems"></tbody>
      </table>
      <hr class="receipt-rule">
      <div class="receipt-row receipt-total"><span>ยอดสุทธิ</span><span><span id="receiptTotal">0.00</span> บาท</span></div>
      <div id="receiptNoteWrap" hidden><hr class="receipt-rule"><strong>หมายเหตุ</strong><div id="receiptNote"></div></div>
      <hr class="receipt-rule">
      <div class="receipt-header">
        <img id="verifyQr" width="120" height="120" alt="QR ตรวจสอบรายการ">
        <div>สแกนเพื่อตรวจสอบรายการจริง</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="module" src="/assets/js/delivery-success.js"></script>
</body>
</html>
