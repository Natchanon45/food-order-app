<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#159447">
  <link rel="stylesheet" href="/assets/css/app.css?v=20260701-001">
  <link rel="stylesheet" href="/assets/css/menu-qr.css?v=20260622-5">
  <link rel="stylesheet" href="/assets/css/menu-pagination.css?v=20260622-5">
  <link rel="stylesheet" href="/assets/css/icons.css?v=20260701-001">
  <link rel="stylesheet" href="/assets/css/sweet-dialog.css?v=20260629-048">
  <title>สั่งกลับบ้าน</title>
</head>
<body class="table-order-page takeaway-order-page">
  <div id="demoBanner"></div>
  <header class="app-header"><div class="brand"><span class="brand-mark">FO</span><span>สั่งกลับบ้าน</span></div><span class="badge" id="takeawayBadge">Take Away</span></header>
  <main class="container">
    <section class="hero"><h1>สั่งอาหารกลับบ้าน</h1><p>กรอกชื่อหรือเบอร์โทร เลือกเมนู แล้วรับเลขคิวสำหรับรับอาหาร</p></section>
    <section class="card" id="customerPanel" style="margin-bottom:18px"><div class="section-title"><h2>ข้อมูลสำหรับเรียกรับอาหาร</h2><span class="badge warning">ไม่ต้องเปิดโต๊ะ</span></div><div class="grid grid-2"><div class="field"><label>ชื่อผู้รับอาหาร</label><input class="input" id="customerName" maxlength="80" placeholder="เช่น คุณเอ"></div><div class="field"><label>เบอร์โทร</label><input class="input" id="customerPhone" inputmode="tel" maxlength="20" placeholder="เช่น 0812345678"></div></div><small>กรอกอย่างน้อย 1 อย่าง เพื่อให้แคชเชียร์เรียกคิวได้ถูกต้อง</small></section>
    <div class="delivery-pos"><div class="delivery-menu-column"><div class="menu-filter-area" id="menuListStart"><div class="category-tabs" id="categoryTabs" role="tablist" aria-label="หมวดหมู่อาหาร"></div><input class="input menu-search" id="searchInput" placeholder="ค้นหาเมนู..."></div><div id="menuGrid" class="grid grid-3"></div><nav id="menuPagination" class="menu-pagination" aria-label="เปลี่ยนหน้ารายการอาหาร" hidden></nav></div><div class="delivery-side-column"><section id="cartSection" class="card current-round"><div class="section-title"><h2>รายการสั่งกลับบ้าน</h2><span id="cartCount" class="badge">0 รายการ</span></div><div id="cartList" class="cart-list"></div><div class="field" style="margin-top:14px"><label>หมายเหตุรวมถึงร้าน</label><textarea class="input" id="orderNote" placeholder="เช่น ขอช้อนเพิ่ม"></textarea></div></section></div></div>
  </main>
  <div class="cart-bar"><div><small>ยอดรวม</small><div style="font-size:20px;font-weight:800"><span id="cartTotal">0.00</span> บาท</div></div><button class="btn btn-primary" id="submitOrder">ส่งรายการเข้าครัว</button></div>
  <script type="module" src="/assets/js/sweet-dialog.js?v=20260629-048"></script>
  <script type="module" src="/assets/js/public-tenant-resolver.js?v=20260629-025"></script>
  <script type="module" src="/assets/js/dom-menu-pagination.js?v=20260629-046"></script>
  <script type="module" src="/assets/js/takeaway-order.js?v=20260701-009"></script>
</body>
</html>
